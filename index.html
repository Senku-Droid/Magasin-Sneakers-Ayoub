<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BonPied - Sneakers Éco-sourcés à Rennes</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <div class="div-header">
        <img src="assets/logo-bon-pied1.png" alt="BonPied Logo" class="logo" />
        <nav class="nav nav-hover">
          <ul>
            <li><a href="#accueil">Accueil</a></li>
            <li><a href="#avantage">Avantages</a></li>
            <li><a href="#produits">Produits</a></li>
            <li><a href="#contact">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <!-- Section Hero -->
      <section class="hero bg-hero" id="accueil">
        <h1 id="titre"></h1>
        <p id="accroche"></p>
        <a href="#produits" class="btn" id="action"></a>
      </section>

      <!-- Section avantages client -->
      <section class="section-avantages" id="avantage">
        <h2 class="h2-avantages">Nos avantages</h2>
        <div class="cards">
          <div class="card">
            <img src="assets/téléchargement (12).jpg" alt="" />
            <p id="avantage-1"></p>
          </div>
          <div class="card">
            <img src="assets/téléchargement (14).jpg" alt="" />
            <p id="avantage-2"></p>
          </div>
          <div class="card">
            <img src="assets/Imagine parks.jpg" alt="Imagine Parks" />
            <p id="avantage-3"></p>
          </div>
        </div>
      </section>

      <!-- Section produits -->
      <section class="section-produits" id="produits">
        <h2 class="h2-produits">Nos produits</h2>
        <div class="cards" id="sneakers-container"></div>
      </section>

      <!-- Section services -->
      <section class="section-services" id="services">
        <h2 class="h2-services">Nos services</h2>
        <div class="cards" id="services-container"></div>
      </section>
    </main>
  </body>
</html>
